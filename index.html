<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estúdio de Criação Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
        }

        .blue-button {
            background-color: #2563eb;
            transition: all 0.2s ease;
        }

        .blue-button:hover:not(:disabled) {
            background-color: #1d4ed8;
            transform: translateY(-1px);
        }

        .blue-button:active:not(:disabled) {
            transform: translateY(0px);
        }
        
        .blue-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .preview-card {
            aspect-ratio: 4 / 5;
            width: 100%;
            max-width: 450px;
            position: relative;
            background-color: #000;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.9);
            transition: background-image 0.8s ease-in-out;
        }

        .shadow-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .custom-range {
            -webkit-appearance: none;
            height: 3px;
            background: #262626;
            border-radius: 5px;
        }

        .custom-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #2563eb;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #fff;
        }

        .highlight-text {
            color: #ffffff;
            font-weight: 800;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input::placeholder, textarea::placeholder {
            color: #404040;
        }

        #settings-modal {
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center min-h-screen">

    <!-- Header -->
    <div class="w-full max-w-6xl flex justify-between items-center mb-6">
        <div class="text-[10px] font-bold tracking-[0.5em] text-zinc-700 uppercase">Professional Studio</div>
        <button onclick="openSettings()" class="p-2 text-zinc-500 hover:text-white transition-colors">
            <i data-lucide="settings" class="w-5 h-5"></i>
        </button>
    </div>

    <!-- Abas -->
    <div class="w-full max-w-sm flex bg-zinc-900/40 p-1 rounded-2xl mb-10 border border-white/5">
        <button id="btn-auto" onclick="switchMode('auto')" class="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-semibold transition-all text-zinc-400">
            <i data-lucide="layers" class="w-4 h-4"></i> Carrossel
        </button>
        <button id="btn-manual" onclick="switchMode('manual')" class="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-semibold transition-all bg-blue-600 text-white shadow-lg">
            <i data-lucide="edit-2" class="w-4 h-4"></i> Único
        </button>
    </div>

    <!-- Toast de Feedback -->
    <div id="toast" class="hidden fixed top-6 z-[210] bg-zinc-900 border border-white/10 text-white px-6 py-3 rounded-2xl flex items-center gap-3 shadow-2xl">
        <i id="toast-icon" data-lucide="info" class="w-5 h-5"></i> <span id="toast-text" class="text-sm font-medium"></span>
    </div>

    <!-- Modal de Chaves API -->
    <div id="settings-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4">
        <div class="bg-zinc-900 border border-white/10 w-full max-w-md p-8 rounded-3xl shadow-2xl space-y-6">
            <div class="text-center space-y-2">
                <h2 class="text-xl font-bold">Acesso ao Estúdio</h2>
                <p class="text-zinc-500 text-xs tracking-wide">Insira as suas chaves API para texto e imagem.</p>
            </div>
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest block pl-1">Chave de Texto</label>
                    <input type="password" id="api-key-text-input" placeholder="Chave Gemini..." class="w-full bg-black border border-white/10 rounded-xl py-3 px-5 focus:outline-none focus:border-blue-500 transition-all text-white font-mono text-sm">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest block pl-1">Chave de Imagem</label>
                    <input type="password" id="api-key-image-input" placeholder="Chave Imagen..." class="w-full bg-black border border-white/10 rounded-xl py-3 px-5 focus:outline-none focus:border-blue-500 transition-all text-white font-mono text-sm">
                </div>
                <div class="flex gap-2 pt-2">
                    <button id="btn-save-key" onclick="saveApiKey()" class="flex-1 blue-button text-white py-4 rounded-xl font-bold text-sm tracking-widest uppercase flex justify-center items-center gap-2">
                        <i data-lucide="check-circle" class="w-4 h-4"></i>
                        <span>Salvar</span>
                    </button>
                    <button id="btn-close-settings" onclick="closeSettings()" class="px-6 bg-zinc-800 text-white py-4 rounded-xl font-bold text-sm hidden hover:bg-zinc-700">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODO AUTOMÁTICO -->
    <div id="section-auto" class="w-full flex flex-col items-center hidden">
        <div class="w-full max-w-3xl mb-12 space-y-6">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="auto-prompt" placeholder="Qual o tema do carrossel?" class="flex-1 bg-zinc-900/60 border border-white/5 rounded-2xl py-4 px-6 text-lg focus:outline-none focus:border-blue-600/30 text-white">
                <div class="flex gap-2">
                    <div class="relative">
                        <input type="number" id="auto-count" value="6" min="1" max="10" class="w-16 h-full bg-zinc-900/60 border border-white/5 rounded-2xl text-center text-white font-bold">
                        <span class="absolute -top-2 left-1/2 -translate-x-1/2 bg-black px-2 text-[8px] font-bold text-zinc-600 uppercase tracking-tighter">Slides</span>
                    </div>
                    <div class="relative">
                        <input type="text" id="user-at-auto" placeholder="@seuuser" class="w-32 h-full bg-zinc-900/60 border border-white/5 rounded-2xl px-4 text-sm lowercase text-white" oninput="updateUsername(this.value)">
                        <span class="absolute -top-2 left-4 bg-black px-2 text-[8px] font-bold text-zinc-600 uppercase tracking-tighter">Identidade</span>
                    </div>
                    <button id="btn-generate-auto" onclick="generateAuto()" class="blue-button text-white rounded-2xl flex items-center justify-center px-6 py-4 shadow-xl">
                        <i data-lucide="arrow-right" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
            <div id="loader-auto" class="hidden flex flex-col items-center gap-3">
                <div class="w-full h-0.5 bg-zinc-900 rounded-full overflow-hidden max-w-xs w-full">
                    <div id="progress-bar" class="h-full bg-blue-600 transition-all duration-700 w-0"></div>
                </div>
                <p id="status-text-auto" class="text-[9px] uppercase tracking-[0.5em] text-zinc-500 font-bold"></p>
            </div>
        </div>

        <div id="display-auto" class="hidden flex flex-col items-center fade-in">
            <div id="auto-counter" class="mb-5 text-[9px] font-bold tracking-[0.5em] text-zinc-600 uppercase px-5 py-2 rounded-full border border-white/5 bg-zinc-900/20"></div>
            <div class="relative group w-full max-w-[450px]">
                <div id="preview-auto" class="preview-card bg-cover bg-center">
                    <div id="overlay-auto" class="shadow-overlay"></div>
                    <div class="absolute bottom-10 left-10 right-10 flex flex-col gap-4">
                        <div class="username-display text-sm font-semibold text-white/40 lowercase tracking-wide"></div>
                        <div id="content-auto"></div>
                    </div>
                </div>
                <button onclick="navSlide(-1)" class="absolute -left-16 top-1/2 -translate-y-1/2 p-3 rounded-full bg-zinc-900/80 hover:bg-white hover:text-black transition-all">
                    <i data-lucide="chevron-left" class="w-6 h-6"></i>
                </button>
                <button onclick="navSlide(1)" class="absolute -right-16 top-1/2 -translate-y-1/2 p-3 rounded-full bg-zinc-900/80 hover:bg-white hover:text-black transition-all">
                    <i data-lucide="chevron-right" class="w-6 h-6"></i>
                </button>
            </div>
            <button onclick="download('auto')" class="mt-10 blue-button text-white py-4 px-14 rounded-2xl font-bold text-sm uppercase flex items-center gap-3">
                <i data-lucide="download" class="w-4 h-4"></i> Salvar Postagem
            </button>
        </div>
    </div>

    <!-- MODO MANUAL -->
    <div id="section-manual" class="w-full max-w-6xl flex flex-col lg:flex-row gap-12 items-start fade-in">
        <div class="flex-1 w-full space-y-8">
            <div class="bg-zinc-900/30 p-8 rounded-3xl border border-white/5 space-y-6">
                <div>
                    <label class="text-[10px] font-bold tracking-[0.3em] text-zinc-600 uppercase mb-3 block flex justify-between">
                        <span>Texto Principal</span>
                        <span class="text-blue-500/40 italic">Processamento otimizado</span>
                    </label>
                    <textarea id="manual-text" oninput="renderManual()" class="w-full bg-black/40 border border-white/5 rounded-2xl py-5 px-6 focus:outline-none focus:border-blue-600/20 text-white h-44 resize-none leading-relaxed text-lg" placeholder="Escreva sua reflexão..."></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-bold tracking-[0.3em] text-zinc-600 uppercase mb-3 block">Identidade (@)</label>
                    <input type="text" id="user-at-manual" oninput="updateUsername(this.value)" class="w-full bg-black/40 border border-white/5 rounded-2xl py-4 px-6 focus:outline-none text-white lowercase" placeholder="@seunome">
                </div>
                <button id="btn-generate-manual" onclick="generateManual()" class="w-full blue-button text-white py-5 rounded-2xl font-extrabold text-sm uppercase tracking-widest flex items-center justify-center gap-3">
                    <i data-lucide="refresh-cw" class="w-5 h-5" id="icon-manual"></i> <span id="txt-btn-manual">Sincronizar Arte</span>
                </button>
            </div>

            <div class="bg-zinc-900/10 p-8 rounded-3xl border border-white/5 space-y-8">
                <div class="flex items-center gap-3 mb-2 opacity-30">
                    <i data-lucide="sliders" class="w-4 h-4"></i>
                    <h3 class="text-[10px] font-bold tracking-[0.4em] uppercase">Design</h3>
                </div>
                <div class="space-y-4">
                    <label class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest block flex justify-between">
                        Tamanho da Fonte <span id="val-text-size" class="text-xs font-mono text-blue-500">24px</span>
                    </label>
                    <input type="range" id="slider-text-size" min="16" max="38" value="24" oninput="updateDesign()" class="w-full custom-range">
                </div>
                <div class="space-y-4">
                    <label class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest block flex justify-between">
                        Destaque Negrito <span id="val-highlight-size" class="text-xs font-mono text-blue-500">115%</span>
                    </label>
                    <input type="range" id="slider-highlight-size" min="1" max="1.6" step="0.05" value="1.15" oninput="updateDesign()" class="w-full custom-range">
                </div>
                <div class="space-y-4">
                    <label class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest block flex justify-between">
                        Sombra do Fundo <span id="val-darkness" class="text-xs font-mono text-blue-500">75%</span>
                    </label>
                    <input type="range" id="slider-darkness" min="0" max="100" value="75" oninput="updateDesign()" class="w-full custom-range">
                </div>
            </div>
        </div>

        <div class="flex-1 w-full flex flex-col items-center lg:sticky lg:top-10">
            <div class="relative w-full max-w-[450px]">
                <div id="preview-manual" class="preview-card bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1080&auto=format&fit=crop');">
                    <div id="overlay-manual" class="shadow-overlay"></div>
                    <div class="absolute bottom-10 left-10 right-10 flex flex-col gap-4">
                        <div class="username-display text-sm font-semibold text-white/40 lowercase tracking-wide">@seunome</div>
                        <div id="content-manual" class="text-zinc-100 font-light leading-snug drop-shadow-2xl whitespace-pre-line"></div>
                    </div>
                </div>
                <button onclick="download('manual')" class="w-full blue-button text-white py-5 rounded-2xl font-bold text-sm uppercase flex items-center justify-center gap-3 mt-8 shadow-2xl">
                    <i data-lucide="download" class="w-4 h-4"></i> Baixar PNG
                </button>
            </div>
        </div>
    </div>

    <script>
        // ESTADOS
        let API_KEY_TEXT = localStorage.getItem('insta_post_api_key_text') || "";
        let API_KEY_IMAGE = localStorage.getItem('insta_post_api_key_image') || "";
        let currentMode = 'manual';
        let slides = [];
        let currentIndex = 0;
        
        // IMAGEM DE FALHA/CARREGAMENTO (Abstrata e segura)
        const defaultImage = "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1080&auto=format&fit=crop";

        window.onload = () => {
            lucide.createIcons();
            if (!API_KEY_TEXT || !API_KEY_IMAGE) {
                openSettings();
            } else {
                document.getElementById('btn-close-settings').classList.remove('hidden');
            }
            renderManual();
            updateDesign();
        };

        function openSettings() { 
            document.getElementById('settings-modal').classList.remove('hidden'); 
            document.getElementById('api-key-text-input').value = API_KEY_TEXT;
            document.getElementById('api-key-image-input').value = API_KEY_IMAGE;
        }
        
        function closeSettings() { 
            if(API_KEY_TEXT && API_KEY_IMAGE) document.getElementById('settings-modal').classList.add('hidden'); 
        }
        
        function saveApiKey() {
            const vText = document.getElementById('api-key-text-input').value.trim();
            const vImage = document.getElementById('api-key-image-input').value.trim();
            
            if(!vText || !vImage) return showMsg("Ambas as chaves são obrigatórias.", true);

            API_KEY_TEXT = vText; 
            API_KEY_IMAGE = vImage; 
            localStorage.setItem('insta_post_api_key_text', vText); 
            localStorage.setItem('insta_post_api_key_image', vImage); 
            
            document.getElementById('btn-close-settings').classList.remove('hidden');
            closeSettings(); 
            showMsg("Chaves guardadas com sucesso.");
        }

        function switchMode(m) {
            currentMode = m;
            document.getElementById('section-auto').classList.toggle('hidden', m !== 'auto');
            document.getElementById('section-manual').classList.toggle('hidden', m !== 'manual');
            const b = "flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-semibold transition-all ";
            document.getElementById('btn-auto').className = b + (m === 'auto' ? "bg-blue-600 text-white shadow-lg" : "text-zinc-500 hover:text-white");
            document.getElementById('btn-manual').className = b + (m === 'manual' ? "bg-blue-600 text-white shadow-lg" : "text-zinc-500 hover:text-white");
            lucide.createIcons();
        }

        function updateUsername(v) {
            const clean = v.toLowerCase().replace(/@/g, '');
            const final = v ? '@' + clean : "@seunome";
            document.querySelectorAll('.username-display').forEach(el => el.innerText = final);
        }

        function formatContent(t, s = 1.15) {
            if (!t) return "";
            return t.replace(/\*\*(.*?)\*\*/g, `<span class="highlight-text" style="font-size: ${s}em">$1</span>`);
        }

        function extractJSON(text) {
            try {
                let clean = text.replace(/```json/g, '').replace(/```/g, '').trim();
                return JSON.parse(clean);
            } catch (e1) {
                try {
                    const match = text.match(/\{[\s\S]*\}/);
                    return match ? JSON.parse(match[0]) : null;
                } catch (e2) {
                    return null;
                }
            }
        }

        // ==========================================
        // MOTOR DE IMAGEM CORRIGIDO (IMAGEN 4.0)
        // ==========================================
        async function getArt(p) {
            if(!API_KEY_IMAGE) return defaultImage;
            
            // Regra forte para evitar erros de segurança e seguir a arquitetura do Google
            const promptFinal = `Cinematic professional photography, moody lighting, dark aesthetic, minimalist, NO text, NO robots, NO artificial intelligence references. Scene: ${p}`;
            
            for (let i = 0; i < 3; i++) {
                try {
                    console.log(`Tentativa ${i+1} de Imagem...`);
                    
                    // Rota estrita e formato de Payload exigido para Imagen 4.0
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${API_KEY_IMAGE}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            instances: [{ prompt: promptFinal }],
                            parameters: { sampleCount: 1 }
                        })
                    });
                    
                    const data = await res.json();
                    
                    if (data.error) {
                        console.error("Erro da API de Imagem:", data.error.message);
                        throw new Error(data.error.message);
                    }
                    
                    if (data.predictions && data.predictions[0] && data.predictions[0].bytesBase64Encoded) {
                        return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                    }

                } catch (e) {
                    console.warn("Falha ao gerar imagem:", e);
                }
                
                // Espera 2.5s antes de tentar de novo para evitar bloqueios de "Too Many Requests"
                await new Promise(r => setTimeout(r, 2500));
            }
            
            console.log("Todas as tentativas de imagem falharam. Usando imagem de segurança.");
            return defaultImage;
        }

        function updateDesign() {
            const size = document.getElementById('slider-text-size').value;
            const hScale = document.getElementById('slider-highlight-size').value;
            const dark = document.getElementById('slider-darkness').value;
            document.getElementById('val-text-size').innerText = size + "px";
            document.getElementById('val-highlight-size').innerText = Math.round(hScale * 100) + "%";
            document.getElementById('val-darkness').innerText = dark + "%";
            const p = document.getElementById('content-manual');
            p.style.fontSize = size + "px";
            document.getElementById('overlay-manual').style.background = `linear-gradient(to top, rgba(0,0,0,${dark/100 + 0.25}) 0%, rgba(0,0,0,${dark/100}) 45%, transparent 85%)`;
            renderManual();
        }

        function renderManual() {
            const t = document.getElementById('manual-text').value || "A disciplina é silenciosa.";
            const h = document.getElementById('slider-highlight-size').value;
            document.getElementById('content-manual').innerHTML = formatContent(t, h);
        }

        // ==========================================
        // MOTOR DE TEXTO (GEMINI 2.5 FLASH PREVIEW)
        // ==========================================
        async function generateManual() {
            const rawText = document.getElementById('manual-text').value;
            if(!rawText || !API_KEY_TEXT || !API_KEY_IMAGE) return;
            
            setLoading('manual', true);
            document.getElementById('txt-btn-manual').innerText = "Analisando Texto...";

            try {
                // Rota oficial estrita para Texto
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY_TEXT}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Analise a frase: "${rawText}". Destaque 2 palavras com **. Crie um prompt de imagem dark em inglês SEM ROBÔS. Retorne apenas JSON: {"txt": "texto aqui", "img": "prompt aqui"}` }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                const d = await res.json();
                if (d.error) throw new Error(d.error.message);
                
                const json = extractJSON(d.candidates[0].content.parts[0].text);
                if(!json) throw new Error("A Inteligência Artificial falhou a estruturar os dados.");
                
                // Mostra texto formatado Imediatamente
                document.getElementById('manual-text').value = json.txt;
                updateDesign();
                document.getElementById('preview-manual').style.backgroundImage = `url('${defaultImage}')`;
                
                // Gera a imagem em background
                document.getElementById('txt-btn-manual').innerText = "Pintando a Arte...";
                const art = await getArt(json.img);
                document.getElementById('preview-manual').style.backgroundImage = `url('${art}')`;
                
            } catch (e) { 
                console.error("Erro Manual:", e);
                showMsg(e.message.includes("API key") ? "Chave de texto inválida ou expirada." : "Erro de comunicação. Tente de novo.", true); 
            } finally { 
                setLoading('manual', false); 
            }
        }

        async function generateAuto() {
            const p = document.getElementById('auto-prompt').value;
            const count = document.getElementById('auto-count').value;
            if(!p || !API_KEY_TEXT || !API_KEY_IMAGE) return;
            
            setLoading('auto', true);
            document.getElementById('status-text-auto').innerText = "A escrever roteiro...";
            document.getElementById('display-auto').classList.add('hidden');

            try {
                const promptG = `Crie um carrossel de ${count} slides sobre o tema "${p}". Texto em Português impactante. Use ** em 2 termos fortes por slide. Retorne APENAS JSON: { "slides": [{ "title": "...", "body": "...", "imgPrompt": "dark scene description NO robots NO AI" }] }`;
                
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY_TEXT}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptG }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                const d = await res.json();
                if (d.error) throw new Error(d.error.message);
                
                const json = extractJSON(d.candidates[0].content.parts[0].text);
                if(!json || !json.slides) throw new Error("Não foi possível gerar texto para este tema.");
                
                const list = json.slides;
                slides = [];
                
                // Mostra todos os slides imediatamente com a imagem padrão
                for (let i = 0; i < list.length; i++) {
                    slides.push({ ...list[i], url: defaultImage });
                }
                currentIndex = 0; 
                renderAuto();
                document.getElementById('display-auto').classList.remove('hidden');

                // Vai desenhando as imagens devagar para não falhar (Rate Limit)
                for (let i = 0; i < list.length; i++) {
                    document.getElementById('status-text-auto').innerText = `A desenhar a arte ${i+1} de ${list.length}...`;
                    document.getElementById('progress-bar').style.width = (((i+1)/list.length)*100) + "%";
                    
                    const art = await getArt(list[i].imgPrompt);
                    slides[i].url = art;
                    
                    // Se o utilizador estiver neste slide, atualiza a foto ao vivo
                    if (currentIndex === i) renderAuto();
                }
                
                document.getElementById('status-text-auto').innerText = "Criação Concluída!";
                document.getElementById('progress-bar').style.width = "100%";
                
                setTimeout(() => {
                    document.getElementById('loader-auto').classList.add('hidden');
                    document.getElementById('btn-generate-auto').disabled = false;
                }, 2000);

            } catch (e) { 
                console.error("Erro Automático:", e);
                showMsg(e.message.includes("API key") ? "Verifique as suas Chaves de API." : e.message, true); 
                setLoading('auto', false);
            }
        }

        function renderAuto() {
            if (slides.length === 0) return;
            const s = slides[currentIndex];
            document.getElementById('auto-counter').innerText = `Slide ${currentIndex + 1} / ${slides.length}`;
            document.getElementById('preview-auto').style.backgroundImage = `url('${s.url}')`;
            document.getElementById('content-auto').innerHTML = `<div class="text-2xl font-bold leading-tight text-white mb-2">${formatContent(s.title, 1.1)}</div><div class="text-lg font-light text-zinc-300 leading-relaxed">${formatContent(s.body, 1.1)}</div>`;
        }

        function navSlide(step) { 
            currentIndex = (currentIndex + step + slides.length) % slides.length; 
            renderAuto(); 
        }

        function setLoading(mode, state) {
            if (mode === 'auto') {
                if (state) {
                    document.getElementById('loader-auto').classList.remove('hidden');
                    document.getElementById('btn-generate-auto').disabled = true;
                    document.getElementById('progress-bar').style.width = "0%";
                }
            } else {
                document.getElementById('btn-generate-manual').disabled = state;
                document.getElementById('icon-manual').className = "w-5 h-5 " + (state ? "animate-spin" : "");
            }
            lucide.createIcons();
        }

        function showMsg(m, e = false) {
            const t = document.getElementById('toast');
            t.className = `fixed top-6 z-[300] px-6 py-3 rounded-2xl flex items-center gap-3 shadow-2xl transition-all border ${e ? 'bg-red-900 border-red-500' : 'bg-zinc-900 border-white/10'}`;
            document.getElementById('toast-text').innerText = m;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 6000);
        }

        async function download(m) {
            const target = m === 'auto' ? document.getElementById('preview-auto') : document.getElementById('preview-manual');
            const canvas = await html2canvas(target, { useCORS: true, scale: 3, backgroundColor: "#000" });
            const link = document.createElement('a');
            link.download = `criacao-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
